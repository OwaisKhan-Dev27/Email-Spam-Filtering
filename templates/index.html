<!DOCTYPE html>
<html>
<head>
    <title>MailShield - AI Email Protection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 5px;
            color: #333;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 130px;
            padding: 12px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            outline: none;
        }

        textarea:focus {
            border-color: #4e73df;
            box-shadow: 0 0 6px rgba(78,115,223,0.3);
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .result {
            margin-top: 25px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
        }

        .spam {
            background-color: #ffe5e5;
            color: #b30000;
        }

        .ham {
            background-color: #e6ffed;
            color: #006622;
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="card">

        <h1>🛡 MailShield</h1>
        <div class="subtitle">AI-Powered Email Spam Detection System</div>

        <form action="/predict" method="POST">
            <textarea name="message" placeholder="Paste your email message here..." required></textarea>
            <button type="submit">Scan Email</button>
        </form>

        {% if prediction_text %}
            {% if prediction_text == "SPAM" %}
                <div class="result spam">
                    🚨 Warning: This email is classified as SPAM.
                </div>
            {% else %}
                <div class="result ham">
                    ✅ Safe: This email is classified as HAM.
                </div>
            {% endif %}
        {% endif %}

        <div class="footer">
            © 2026 MailShield | Built with Flask & Machine Learning
        </div>

    </div>

</body>
</html>
